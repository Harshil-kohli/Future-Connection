<svg width="540" height="720" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="540" height="720" fill="#0a0a0a"/>
  
  <!-- Header -->
  <rect width="540" height="60" fill="#1f2937"/>
  <text x="20" y="38" font-size="20" fill="white" font-family="Arial, sans-serif" font-weight="bold">#general</text>
  
  <!-- Messages -->
  <!-- Message 1 -->
  <circle cx="30" cy="90" r="16" fill="#2563eb"/>
  <text x="30" y="95" font-size="12" fill="white" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">J</text>
  <rect x="60" y="75" width="200" height="40" rx="8" fill="#374151"/>
  <text x="70" y="90" font-size="11" fill="#9ca3af" font-family="Arial, sans-serif">John Doe</text>
  <text x="70" y="108" font-size="13" fill="white" font-family="Arial, sans-serif">Hey team! How's it going?</text>
  
  <!-- Message 2 -->
  <circle cx="30" cy="150" r="16" fill="#10b981"/>
  <text x="30" y="155" font-size="12" fill="white" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">S</text>
  <rect x="60" y="135" width="250" height="40" rx="8" fill="#374151"/>
  <text x="70" y="150" font-size="11" fill="#9ca3af" font-family="Arial, sans-serif">Sarah Smith</text>
  <text x="70" y="168" font-size="13" fill="white" font-family="Arial, sans-serif">Great! Just finished the design 🎨</text>
  
  <!-- Message 3 (Own message - right aligned) -->
  <rect x="280" y="195" width="240" height="40" rx="8" fill="#2563eb"/>
  <text x="290" y="210" font-size="11" fill="#93c5fd" font-family="Arial, sans-serif">You</text>
  <text x="290" y="228" font-size="13" fill="white" font-family="Arial, sans-serif">Awesome! Can't wait to see it 👍</text>
  
  <!-- Message 4 -->
  <circle cx="30" cy="270" r="16" fill="#f59e0b"/>
  <text x="30" y="275" font-size="12" fill="white" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">M</text>
  <rect x="60" y="255" width="220" height="40" rx="8" fill="#374151"/>
  <text x="70" y="270" font-size="11" fill="#9ca3af" font-family="Arial, sans-serif">Mike Johnson</text>
  <text x="70" y="288" font-size="13" fill="white" font-family="Arial, sans-serif">Meeting at 3pm today? 📅</text>
  
  <!-- Message 5 -->
  <circle cx="30" cy="330" r="16" fill="#2563eb"/>
  <text x="30" y="335" font-size="12" fill="white" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">J</text>
  <rect x="60" y="315" width="180" height="40" rx="8" fill="#374151"/>
  <text x="70" y="330" font-size="11" fill="#9ca3af" font-family="Arial, sans-serif">John Doe</text>
  <text x="70" y="348" font-size="13" fill="white" font-family="Arial, sans-serif">Works for me! ✅</text>
  
  <!-- Sidebar indicator -->
  <rect x="0" y="60" width="4" height="660" fill="#2563eb"/>
  
  <!-- Input area -->
  <rect y="660" width="540" height="60" fill="#1f2937"/>
  <rect x="20" y="675" width="440" height="30" rx="15" fill="#374151"/>
  <text x="35" y="695" font-size="13" fill="#6b7280" font-family="Arial, sans-serif">Type a message...</text>
  <circle cx="495" cy="690" r="18" fill="#2563eb"/>
  <text x="495" y="696" font-size="16" fill="white" font-family="Arial, sans-serif" text-anchor="middle">➤</text>
  
  <!-- App name at bottom -->
  <text x="270" y="710" font-size="10" fill="#4b5563" font-family="Arial, sans-serif" text-anchor="middle">Pingro - Team Chat</text>
</svg>
