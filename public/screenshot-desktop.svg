<svg width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="720" fill="#0a0a0a"/>
  
  <!-- Thin Sidebar -->
  <rect width="64" height="720" fill="#111827"/>
  <circle cx="32" cy="32" r="20" fill="#2563eb"/>
  <text x="32" y="38" font-size="18" fill="white" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">P</text>
  
  <!-- Channel Sidebar -->
  <rect x="64" width="256" height="720" fill="#1f2937"/>
  <text x="84" y="40" font-size="16" fill="white" font-family="Arial, sans-serif" font-weight="bold">My Workspace</text>
  
  <!-- Channels Section -->
  <text x="84" y="80" font-size="12" fill="#9ca3af" font-family="Arial, sans-serif" font-weight="bold">CHANNELS</text>
  <rect x="74" y="95" width="236" height="32" rx="6" fill="#2563eb"/>
  <text x="90" y="115" font-size="14" fill="white" font-family="Arial, sans-serif"># general</text>
  <circle cx="290" cy="111" r="8" fill="#10b981"/>
  <text x="290" y="114" font-size="10" fill="white" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">3</text>
  
  <text x="90" y="145" font-size="14" fill="#d1d5db" font-family="Arial, sans-serif"># random</text>
  <text x="90" y="175" font-size="14" fill="#d1d5db" font-family="Arial, sans-serif"># design</text>
  
  <!-- Direct Messages Section -->
  <text x="84" y="220" font-size="12" fill="#9ca3af" font-family="Arial, sans-serif" font-weight="bold">DIRECT MESSAGES</text>
  <circle cx="90" cy="250" r="12" fill="#2563eb"/>
  <text x="90" y="254" font-size="10" fill="white" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">J</text>
  <text x="110" y="255" font-size="14" fill="#d1d5db" font-family="Arial, sans-serif">John Doe</text>
  
  <circle cx="90" cy="285" r="12" fill="#10b981"/>
  <text x="90" y="289" font-size="10" fill="white" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">S</text>
  <text x="110" y="290" font-size="14" fill="#d1d5db" font-family="Arial, sans-serif">Sarah Smith</text>
  
  <!-- Main Chat Area -->
  <rect x="320" width="960" height="720" fill="#111827"/>
  
  <!-- Chat Header -->
  <rect x="320" width="960" height="60" fill="#1f2937"/>
  <text x="340" y="38" font-size="18" fill="white" font-family="Arial, sans-serif" font-weight="bold"># general</text>
  <text x="340" y="52" font-size="11" fill="#9ca3af" font-family="Arial, sans-serif">Team discussions and updates</text>
  
  <!-- Messages -->
  <!-- Message 1 -->
  <circle cx="350" cy="100" r="20" fill="#2563eb"/>
  <text x="350" y="106" font-size="14" fill="white" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">J</text>
  <text x="385" y="95" font-size="13" fill="white" font-family="Arial, sans-serif" font-weight="bold">John Doe</text>
  <text x="460" y="95" font-size="11" fill="#6b7280" font-family="Arial, sans-serif">10:30 AM</text>
  <rect x="385" y="105" width="400" height="50" rx="8" fill="#374151"/>
  <text x="400" y="128" font-size="14" fill="white" font-family="Arial, sans-serif">Hey everyone! Just pushed the latest updates</text>
  <text x="400" y="145" font-size="14" fill="white" font-family="Arial, sans-serif">to the repository. Please review when you can 🚀</text>
  
  <!-- Message 2 -->
  <circle cx="350" cy="200" r="20" fill="#10b981"/>
  <text x="350" y="206" font-size="14" fill="white" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">S</text>
  <text x="385" y="195" font-size="13" fill="white" font-family="Arial, sans-serif" font-weight="bold">Sarah Smith</text>
  <text x="480" y="195" font-size="11" fill="#6b7280" font-family="Arial, sans-serif">10:32 AM</text>
  <rect x="385" y="205" width="350" height="35" rx="8" fill="#374151"/>
  <text x="400" y="228" font-size="14" fill="white" font-family="Arial, sans-serif">Perfect timing! I'll check it out now ✅</text>
  
  <!-- Message 3 (Own message) -->
  <rect x="850" y="270" width="400" height="50" rx="8" fill="#2563eb"/>
  <text x="1235" y="265" font-size="13" fill="#93c5fd" font-family="Arial, sans-serif" text-anchor="end">You</text>
  <text x="1235" y="280" font-size="11" fill="#93c5fd" font-family="Arial, sans-serif" text-anchor="end">10:35 AM</text>
  <text x="865" y="293" font-size="14" fill="white" font-family="Arial, sans-serif">Thanks for the quick turnaround! The new</text>
  <text x="865" y="310" font-size="14" fill="white" font-family="Arial, sans-serif">features look amazing 🎉</text>
  
  <!-- Message 4 -->
  <circle cx="350" cy="360" r="20" fill="#f59e0b"/>
  <text x="350" y="366" font-size="14" fill="white" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">M</text>
  <text x="385" y="355" font-size="13" fill="white" font-family="Arial, sans-serif" font-weight="bold">Mike Johnson</text>
  <text x="490" y="355" font-size="11" fill="#6b7280" font-family="Arial, sans-serif">10:40 AM</text>
  <rect x="385" y="365" width="450" height="35" rx="8" fill="#374151"/>
  <text x="400" y="388" font-size="14" fill="white" font-family="Arial, sans-serif">Great work team! Let's sync up at 3pm to discuss next steps 📅</text>
  
  <!-- Typing indicator -->
  <text x="385" y="430" font-size="12" fill="#6b7280" font-family="Arial, sans-serif" font-style="italic">John is typing...</text>
  
  <!-- Input Area -->
  <rect x="320" y="660" width="960" height="60" fill="#1f2937"/>
  <rect x="340" y="675" width="860" height="30" rx="15" fill="#374151"/>
  <text x="360" y="695" font-size="13" fill="#6b7280" font-family="Arial, sans-serif">Message #general</text>
  <circle cx="1230" cy="690" r="18" fill="#2563eb"/>
  <text x="1230" y="696" font-size="16" fill="white" font-family="Arial, sans-serif" text-anchor="middle">➤</text>
  
  <!-- App branding -->
  <text x="640" y="710" font-size="10" fill="#4b5563" font-family="Arial, sans-serif" text-anchor="middle">Pingro - Real-time Team Chat</text>
</svg>
